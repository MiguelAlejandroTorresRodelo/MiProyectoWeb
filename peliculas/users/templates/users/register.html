{% extends "movies/base.html" %}

{% block content %}
<div class="flex min-h-full justify-center py-10 px-4 sm:px-6 lg:px-8">
  <div class="border shadow-md rounded-xl px-8 pt-6 pb-8 mb-4 flex flex-col w-full max-w-md">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Crear cuenta</h1>

    <form method="post" action="{% url 'register' %}">
      {% csrf_token %}
      <div class="mb-4">
        <input type="text" name="username" placeholder="Usuario"
               class="w-full rounded-md border px-3 py-2 text-gray-900" required>
      </div>
      <div class="mb-4">
        <input type="password" name="password" placeholder="Contraseña"
               class="w-full rounded-md border px-3 py-2 text-gray-900" required>
      </div>
      <div class="mb-4">
        <input type="password" name="confirm_password" placeholder="Confirmar contraseña"
               class="w-full rounded-md border px-3 py-2 text-gray-900" required>
      </div>

      <button type="submit"
              class="w-full bg-indigo-600 text-white font-semibold rounded-md px-4 py-2 hover:bg-indigo-500">
        Registrarse
      </button>
    </form>

    <p class="mt-4 text-sm text-gray-600">
      ¿Ya tienes cuenta?
      <a href="{% url 'login' %}" class="text-blue-600 hover:underline">Inicia sesión</a>
    </p>
  </div>
  
</div>
{% if messages %}
  <div class="mb-4">
    {% for message in messages %}
      <p class="text-red-600 text-sm">{{ message }}</p>
    {% endfor %}
  </div>
{% endif %}
{% endblock content %}
