{% extends "movies/base.html" %}

{% block content %}
<div class="container mx-auto px-5 py-6 lg:px-32">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">Mis Favoritos</h1>

  {% if movies %}
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      {% for movie in movies %}
        <div class="bg-white rounded-lg shadow hover:shadow-lg transition">
          <img class="w-full h-64 object-cover rounded-t-lg"
               src="https://image.tmdb.org/t/p/w600_and_h900_bestv2/{{ movie.poster_path }}"
               alt="{{ movie.title }}">
          <div class="p-4">
            <h2 class="text-lg font-semibold text-gray-900 truncate">{{ movie.title }}</h2>
            <p class="text-sm text-gray-500">{{ movie.release_date|date:"Y" }}</p>
            <a href="/movies/{{ movie.id }}" 
               class="mt-2 inline-block text-blue-600 text-sm font-medium hover:underline">
              Ver detalles
            </a>
          </div>
        </div>
      {% endfor %}
    </div>
  {% else %}
    <p class="text-gray-600 text-base">Todavía no tienes películas en favoritos.</p>
  {% endif %}
</div>
{% endblock content %}
