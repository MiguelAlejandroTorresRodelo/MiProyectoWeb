{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Tailwind -->
    <link href="{% static 'output.css' %}" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>

    {% block head %}{% endblock head %}
    <title>My Movies</title>

    <script>
      /* Prevent Firefox FOUC */
      let FF_FOUC_FIX;
    </script>

    <style>
      {% block style %}{% endblock style %}
    </style>
  </head>

  <body class="bg-white dark:bg-slate-900 min-h-screen flex flex-col" 
        hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    
    <!-- Header -->
    {% block header %}
      {% include "movies/header.html" %} 
    {% endblock header %}

    <!-- Main content -->
    <main class="flex-grow">
      {% block content %}{% endblock content %}
    </main>

    <!-- Footer -->
    {% block footer %}
    <footer class="bg-white dark:bg-slate-800">
      <div class="mx-auto max-w-7xl overflow-hidden px-6 py-10 sm:py-12 lg:px-8">
        <p class="mt-3 text-gray-600 font-thin text-sm sm:text-base">Data from: IMDB</p>
      </div>
    </footer>
    {% endblock footer %}

    <!-- Scripts -->
    <script src="https://unpkg.com/hyperscript.org@0.9.7"></script>
    <script src="https://unpkg.com/htmx.org@1.8.5" integrity="sha384-7aHh9lqPYGYZ7sTHvzP1t3BAfLhYSTy9ArHdP3Xsr9/3TlGurYgcPBoFmXX2TX/w" crossorigin="anonymous"></script>

    {% block scripts %}{% endblock scripts %}
  </body>
</html>
